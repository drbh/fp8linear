name: Run kernel

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run basic.py on an HF Jobs H200 GPU
        uses: huggingface/hf-jobs-action@main
        with:
          token: ${{ secrets.HF_TOKEN }}
          namespace: drbh
          # flavor: h200
          flavor: rtx-pro-6000
          image: ghcr.io/astral-sh/uv:python3.10-bookworm
          timeout: "3600"
          files: scripts/basic.py
          script: |
            set +x
            export HF_TOKEN="${{ secrets.HF_TOKEN }}"
            export FP8LINEAR_USE_MX=1
            uv run /tmp/files/basic.py
